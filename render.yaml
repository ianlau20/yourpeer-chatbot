services:
  # -----------------------------------------------------------------------
  # Backend — FastAPI (private API, not publicly accessible)
  # -----------------------------------------------------------------------
  # Private services are only reachable from other Render services in the
  # same account via internal networking. All public traffic flows through
  # the Next.js frontend, which adds rate limiting and auth headers.
  - type: private
    name: yourpeer-chatbot-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  # -----------------------------------------------------------------------
  # Frontend — Next.js (public-facing)
  # -----------------------------------------------------------------------
  - type: web
    name: yourpeer-chatbot
    runtime: node
    plan: starter
    rootDir: frontend-next
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "24.0.0"
      # Points at the backend's INTERNAL Render URL.
      # Private services use http://<service-name>:<port> internally.
      # After first deploy, verify this matches the actual internal URL
      # shown in the Render dashboard under the private service's settings.
      - key: CHAT_BACKEND_URL
        sync: false
      # Must match the backend's ADMIN_API_KEY — the Next.js proxy
      # forwards this to the backend on all /api/admin/* requests.
      - key: ADMIN_API_KEY
        sync: false
