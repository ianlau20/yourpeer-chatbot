services:
  # -----------------------------------------------------------------------
  # Backend — FastAPI (headless API)
  # -----------------------------------------------------------------------
  - type: web
    name: yourpeer-chatbot-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  # -----------------------------------------------------------------------
  # Frontend — Next.js
  # -----------------------------------------------------------------------
  - type: web
    name: yourpeer-chatbot
    runtime: node
    plan: free
    rootDir: frontend-next
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "24.0.0"
      # Points at the backend's Render URL.
      # After first deploy, verify this matches the actual .onrender.com URL.
      - key: CHAT_BACKEND_URL
        value: https://yourpeer-chatbot-api.onrender.com
      # Must match the backend's ADMIN_API_KEY — the Next.js proxy
      # forwards this to the backend on all /api/admin/* requests.
      - key: ADMIN_API_KEY
        sync: false
